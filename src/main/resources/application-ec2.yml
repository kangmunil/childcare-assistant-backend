server:
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_MAX_THREADS:20}
      min-spare: ${SERVER_TOMCAT_MIN_SPARE_THREADS:2}
    max-connections: ${SERVER_TOMCAT_MAX_CONNECTIONS:200}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:25}
  compression:
    enabled: true

spring:
  main:
    lazy-initialization: true
    banner-mode: off

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 25

  datasource:
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:3}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      idle-timeout: 300000
      max-lifetime: 900000
      connection-timeout: 5000
      validation-timeout: 3000

logging:
  level:
    root: WARN
    com.childcare: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql: WARN
    org.springframework.security: WARN
