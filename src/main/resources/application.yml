server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: childcare-assistant

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 50MB

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.childcare.domain
  configuration:
    map-underscore-to-camel-case: true

supabase:
  url: ${SUPABASE_URL}
  service-key: ${SUPABASE_SERVICE_KEY}
  storage:
    bucket: board-files
    child-image-bucket: child-images

  security:
    user:
      name: admin
      password: admin

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-in-seconds: ${JWT_EXPIRATION:86400}

file:
  upload-dir: uploads

ai:
  service-url: ${AI_SERVICE_URL:http://localhost:8000}

kakao:
  rest-api-key: ${KAKAO_REST_API_KEY:}

logging:
  level:
    root: INFO
    com.childcare: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.security: TRACE
