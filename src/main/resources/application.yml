server:
  port: 8081
  servlet:
    context-path: /api
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: childcare-assistant
    
  datasource:
    url: jdbc:postgresql://localhost:5432/childcare
    username: postgres
    password: yourpassword
    driver-class-name: org.postgresql.Driver
    
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true
    open-in-view: false

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.childcare.domain
  configuration:
    map-underscore-to-camel-case: true


  security:
    user:
      name: admin
      password: admin

jwt:
  secret: mySecretKeyForChildcareAssistantApp1234567890123456789012345
  access-token-validity-in-seconds: 86400
      
logging:
  level:
    root: INFO
    com.childcare: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.springframework.security: TRACE